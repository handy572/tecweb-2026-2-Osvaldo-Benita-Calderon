<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de categorias</title>
</head>
<body>
    <h1>Lista de categorias</h1>
    <a href="/categorias/crear">Crear una nueva categoria</a><br>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripcion</th>
                <th>Fecha Creacion</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categorias}">
                <td th:text="${cat.id}"></td>
                <td th:text="${cat.nombre}"></td>
                <td th:text="${cat.descripcion}"></td>
                <td th:text="${cat.fecha}"></td>
                <td>
                    <a th:href="@{'/categorias/editar/' + ${cat.id}}">Editar</a>
                    |
                    <a th:href="@{'/categorias/eliminar/' + ${cat.id}}"
                       onclick="return confirm('¿Seguro que desea eliminar esta categoria')">
                        Eliminar
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
