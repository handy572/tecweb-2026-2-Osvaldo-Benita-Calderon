<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eliminar categoria</title>
</head>
<body>
    <h1>Eliminar categoria</h1>
    <p>¿Estás seguro de que deseas eliminar la siguiente categoría?</p>

    <table border="1">
        <tr>
            <th>ID</th>
            <td th:text="${categoria.id}"></td>
        </tr>

        <tr>
            <th>Nombre</th>
            <td th:text="${categoria.nombre}"></td>
        </tr>

        <tr>
            <th>Descripción</th>
            <td th:text="${categoria.descripcion}"></td>
        </tr>

        <tr>
            <th>Fecha Creación</th>
            <td th:text="${categoria.fecha}"></td>
        </tr>
    </table><br>

    <form th:action="@{'/categorias/eliminar/' + ${categoria.id}}" method="get">
        <button type="submit">Confirmar Eliminación</button>
    </form><br>

    <a href="/categorias">Cancelar</a>
</body>
</html>
